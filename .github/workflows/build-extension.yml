name: Build Chrome Extension

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
    paths:
      - 'extension/**'
      - '.github/workflows/build-extension.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'extension/**'
      - '.github/workflows/build-extension.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Prepare extension package
        run: |
          rm -rf extension-package
          mkdir -p extension-package
          cp extension/manifest.json extension-package/
          cp extension/popup.html extension-package/
          cp extension/popup.js extension-package/
          cp -R extension/dist extension-package/
          cp -R extension/icons extension-package/

      - name: Verify extension package assets
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const packageDir = path.join(process.cwd(), 'extension-package');
          const manifest = JSON.parse(
            fs.readFileSync(path.join(packageDir, 'manifest.json'), 'utf8')
          );

          const requiredFiles = new Set(['manifest.json']);

          if (manifest.background?.service_worker) {
            requiredFiles.add(manifest.background.service_worker);
          }

          if (manifest.action?.default_popup) {
            requiredFiles.add(manifest.action.default_popup);
          }

          for (const iconPath of Object.values(manifest.icons ?? {})) {
            requiredFiles.add(iconPath);
          }

          for (const iconPath of Object.values(manifest.action?.default_icon ?? {})) {
            requiredFiles.add(iconPath);
          }

          const missingFiles = [...requiredFiles].filter(
            (relativePath) => !fs.existsSync(path.join(packageDir, relativePath))
          );

          if (missingFiles.length > 0) {
            console.error('Missing files in extension package:');
            for (const missingFile of missingFiles) {
              console.error(`- ${missingFile}`);
            }
            process.exit(1);
          }
          EOF

      - name: Create Extension ZIP
        run: |
          cd extension-package
          zip -r ../opencli-extension.zip .

      - name: Upload Artifacts (Action Run)
        uses: actions/upload-artifact@v7
        with:
          name: opencli-extension-build
          path: |
            opencli-extension.zip
          retention-days: 7

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            opencli-extension.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
