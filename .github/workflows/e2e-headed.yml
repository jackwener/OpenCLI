name: E2E Headed Chrome

on:
  # E2E removed from `pull_request` to keep PR feedback under ~2 minutes; PR-time
  # protection is the CI workflow (typecheck / unit / lint / adapter / build).
  # E2E still guards `main` directly, runs nightly, and on release tag push so
  # protocol/CDP/extension contract regressions are caught before they ship.
  push:
    branches: [main, dev]
    paths:
      - 'extension/**'
      - 'src/browser/**'
      - 'src/daemon.ts'
      - 'src/execution.ts'
      - 'src/interceptor.ts'
      - 'tests/e2e/**'
      - 'tests/smoke/**'
      - '.github/actions/setup-chrome/**'
      - '.github/workflows/e2e-headed.yml'
    tags: ['v*']
  schedule:
    # Daily 08:00 UTC — catch flake / Chrome-version drift even when no commits
    # touched the watched paths recently.
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-headed:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows uses the image's preinstalled Chrome (setup-chrome action
        # hangs on the MSI path); it runs the deterministic gates (AX smoke +
        # daemon transport contracts). macOS pinned to 15 while the macOS 26
        # image stabilizes; with the smoke now headless the GUI-session
        # dependency is gone, so the pin should be removable next.
        os: [ubuntu-latest, macos-15, windows-latest]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Chrome
        uses: ./.github/actions/setup-chrome
        id: setup-chrome

      - name: Build
        run: npm run build

      - name: Build extension
        run: npm run build --prefix extension

      # The AX smoke runs Chrome in new-headless mode: a full browser (MV3
      # service worker + chrome.debugger + --load-extension) with no display
      # server or GUI-session dependency, so the same command is release-
      # blocking on every OS. Headed Chrome on hosted macOS fails Mach port
      # rendezvous for child processes (CI jobs run outside a regular Aqua
      # session); headless removes that entire failure class instead of
      # skipping the platform.
      - name: Run AX Chrome smoke (headless, all platforms)
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          OPENCLI_AX_E2E: '1'
        run: npx vitest run --project e2e tests/e2e/browser-ax-chrome.test.ts --reporter=verbose

      # Transport contract E2E: real daemon process + scripted fake extension.
      # Pins the cross-layer contracts (waiter attach, deadline 408, dispatched
      # disconnect, profile fallback, graceful shutdown) end to end with the
      # actual daemon binary — no browser required, deterministic on every OS.
      - name: Run daemon transport contract E2E
        run: npx vitest run --project e2e-fixed-port tests/e2e/daemon-transport.test.ts --reporter=verbose

      - name: Run E2E tests (Linux, via xvfb)
        if: runner.os == 'Linux'
        env:
          OPENCLI_AX_E2E: '0'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            npx vitest run tests/e2e/ --reporter=verbose

      # The full e2e suite (real-site adapters) stays on Linux/macOS for now;
      # Windows runs the two deterministic blocking gates above. Expanding the
      # full suite to Windows is tracked separately.
      - name: Run E2E tests (macOS)
        if: runner.os == 'macOS'
        env:
          OPENCLI_AX_E2E: '0'
        run: npx vitest run tests/e2e/ --reporter=verbose
