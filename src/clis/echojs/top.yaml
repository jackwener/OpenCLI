site: echojs
name: top
description: Top stories on Echo JS
domain: www.echojs.com
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of stories

pipeline:
  - fetch:
      url: https://www.echojs.com/api/getnews/top/0/30

  - select: news

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      upvotes: ${{ item.up }}
      comments: ${{ item.comments }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, title, upvotes, comments, url]
