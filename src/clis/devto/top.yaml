site: devto
name: top
description: Get top DEV.to articles of the day
domain: dev.to
strategy: public
browser: false

args:
  limit:
    type: int
    default: 10
    description: Max number of stories

pipeline:
  - fetch:
      url: https://dev.to/api/articles?top=1&per_page=${{ args.limit }}
  
  - map:
      title: "${{ item.title }}"
      author: "${{ item.user.username }}"
      reactions: "${{ item.public_reactions_count }}"
      comments: "${{ item.comments_count }}"
      url: "${{ item.url }}"

  - limit: ${{ args.limit }}

columns: [title, author, reactions, comments, url]
