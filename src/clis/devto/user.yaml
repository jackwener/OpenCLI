site: devto
name: user
description: Get recent DEV.to articles from a specific user
domain: dev.to
strategy: public
browser: false

args:
  username:
    type: string
    required: true
    description: The developer's DEV.to username
  limit:
    type: int
    default: 10
    description: Max number of stories

pipeline:
  - fetch:
      url: https://dev.to/api/articles?username=${{ args.username }}&per_page=${{ args.limit }}
  
  - map:
      title: "${{ item.title }}"
      author: "${{ item.user.username }}"
      reactions: "${{ item.public_reactions_count }}"
      comments: "${{ item.comments_count }}"
      url: "${{ item.url }}"

  - limit: ${{ args.limit }}

columns: [title, author, reactions, comments, url]
