site: xueqiu
name: fund-accounts
description: 获取雪球基金（蛋卷）子账户汇总信息
domain: danjuanfunds.com
browser: true

pipeline:
  - navigate: https://danjuanfunds.com/my-money
  - evaluate: |
      (async () => {
        const resp = await fetch('https://danjuanfunds.com/djapi/fundx/profit/assets/gain?gains=%5B%22private%22%5D', { credentials: 'include' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status + ' Hint: Not logged in to danjuanfunds.com?');
        const d = await resp.json();
        const root = d?.data || {};
        const fundSection = (Array.isArray(root.items) ? root.items : []).find((item) => item?.summary_type === 'FUND');
        const accounts = Array.isArray(fundSection?.invest_account_list) ? fundSection.invest_account_list : [];
        if (!accounts.length) throw new Error('未找到基金子账户，可能未登录蛋卷资产页');
        return accounts.map((acc) => ({
          accountId: acc.invest_account_id,
          accountName: acc.invest_account_name,
          accountType: acc.invest_account_type,
          accountCode: acc.invest_account_code,
          marketValue: Number(acc.market_value),
          dailyGain: Number(acc.daily_gain),
          remindText: acc.remind_text || '',
          mainFlag: !!acc.main_flag,
          totalFundMarketValue: root?.items?.find?.((item) => item?.summary_type === 'FUND')?.amount ?? null,
          totalAssetAmount: root.amount ?? null,
          totalAssetDailyGain: root.daily_gain ?? null,
          totalAssetHoldGain: root.hold_gain ?? null,
          totalAssetTotalGain: root.total_gain ?? null,
          dailyGainDate: root.daily_gain_date || null,
        }));
      })()

  - map:
      accountId: ${{ item.accountId }}
      accountName: ${{ item.accountName }}
      accountType: ${{ item.accountType }}
      marketValue: ${{ item.marketValue }}
      dailyGain: ${{ item.dailyGain }}
      remindText: ${{ item.remindText }}

columns: [accountId, accountName, accountType, marketValue, dailyGain, remindText]
